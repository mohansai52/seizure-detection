<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Seizure Detection Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<div class="container mt-5">
  <h1 class="text-center mb-4">Epileptic Seizure Detection</h1>

  {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
  {% endif %}

  <div class="card bg-secondary mb-4">
    <div class="card-body">
      <form method="post" enctype="multipart/form-data">
        <div class="mb-3">
          <label for="file" class="form-label">Upload physiological data (.csv or .xlsx)</label>
          <input class="form-control" type="file" id="file" name="file" accept=".csv,.xlsx,.xls" required>
        </div>
        <button type="submit" class="btn btn-primary">Analyze</button>
      </form>
    </div>
  </div>

  {% if sessions is not none %}
    <div class="alert alert-info">
      <h4>Result</h4>
      <p>Rows processed: <strong>{{ rows_processed }}</strong></p>
      <p>Detected seizure sessions: <strong>{{ sessions }}</strong></p>
    </div>
  {% endif %}

  {% if table %}
    <h4>Preview (first 100 rows)</h4>
    <div class="table-responsive">
      {{ table | safe }}
    </div>
  {% endif %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
