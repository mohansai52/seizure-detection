<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Seizure Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #e2e8f0; }
        .log { 
            background: #1e2937; 
            height: 480px; 
            overflow-y: auto; 
            padding: 15px; 
            border-radius: 8px; 
            font-family: monospace;
        }
        .seizure-alert { 
            font-size: 2.2rem; 
            animation: pulse 1.2s infinite; 
        }
        @keyframes pulse { 
            0% { transform: scale(1); } 
            50% { transform: scale(1.08); } 
        }
    </style>
</head>
<body>
<div class="container mt-5">
    <h1 class="text-center mb-4">🔴 Live Seizure Detection Monitor</h1>
    
    <div class="alert alert-info text-center" id="info">
        Flutter app is running • Waiting for data...
    </div>

    <div class="row">
        <div class="col-md-8">
            <h5>Live Data Log</h5>
            <div id="log" class="log"></div>
        </div>
        
        <div class="col-md-4">
            <h5>Current Status</h5>
            <div id="status" class="alert alert-secondary">Waiting for data from Flutter...</div>
            
            <h5>Seizure Sessions</h5>
            <div id="sessions" class="alert alert-warning">0 Sessions Detected</div>
        </div>
    </div>

    <div id="bigAlert" class="alert alert-danger seizure-alert text-center mt-4" style="display:none;">
        🚨 <strong>SEIZURE DETECTED!</strong> 🚨<br>
        <small>Immediate attention required</small>
    </div>
</div>

<script>
    let sessionCount = 0;
    let consecutive = 0;
    let lastData = null;

    function addLog(message, isSeizure = false) {
        const log = document.getElementById('log');
        const time = new Date().toLocaleTimeString();
        const color = isSeizure ? 'text-danger fw-bold' : 'text-light';
        log.innerHTML += `<div class="${color}">[${time}] ${message}</div>`;
        log.scrollTop = log.scrollHeight;
    }

    // Poll the latest prediction every 1.5 seconds
    async function pollLatestPrediction() {
        try {
            // We send the last known data or a dummy one to trigger prediction
            const payload = lastData || {
                "heart_rate": 100,
                "spo2": 95,
                "temperature": 37,
                "vibration": 0.5
            };

            const res = await fetch('/api/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!res.ok) throw new Error('Server error');

            const result = await res.json();
            const isSeizure = result.prediction === 1;
            const prob = result.probability ? (result.probability * 100).toFixed(1) + '%' : 'N/A';

            // Update UI
            document.getElementById('status').innerHTML = `
                Latest: <strong>${isSeizure ? 'SEIZURE' : 'Normal'}</strong> (${prob})
            `;

            if (isSeizure) {
                consecutive++;
                if (consecutive >= 2 && lastData) {
                    sessionCount++;
                    document.getElementById('sessions').innerHTML = `Sessions Detected: <strong>${sessionCount}</strong>`;
                    document.getElementById('bigAlert').style.display = 'block';
                }
            } else {
                consecutive = 0;
                document.getElementById('bigAlert').style.display = 'none';
            }

            // Log only when we have real data from Flutter
            if (lastData) {
                addLog(`HR:${lastData.heart_rate} | SpO2:${lastData.spo2} | Temp:${lastData.temperature} | Vib:${lastData.vibration} → ${isSeizure ? 'SEIZURE' : 'Normal'} (${prob})`, isSeizure);
            }

        } catch (err) {
            console.error("Polling error:", err);
        }
    }

    // This function will be called from Flutter (we'll modify Flutter later if needed)
    window.updateFromFlutter = function(data) {
        lastData = data;
        addLog("Received from Flutter app", false);
        pollLatestPrediction();
    };

    // Start polling
    setInterval(pollLatestPrediction, 1500);

    // Initial message
    setTimeout(() => {
        if (document.getElementById('log').innerHTML === '') {
            addLog("Waiting for data from Flutter Simulation...", false);
        }
    }, 2000);

    console.log("Realtime monitor ready. Make sure Flutter is sending data.");
</script>
</body>
</html>
