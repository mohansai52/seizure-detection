<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Seizure Detection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #1a1a2e; color: #eee; }
        .log { 
            background-color: #16213e; 
            height: 420px; 
            overflow-y: auto; 
            padding: 15px; 
            border-radius: 8px;
            font-family: monospace;
        }
        .seizure-alert {
            font-size: 2rem;
            padding: 25px;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
    </style>
</head>
<body>
<div class="container mt-5">
    <h1 class="text-center mb-4">🔴 Real-Time Seizure Detection</h1>
    
    <div class="text-center mb-4">
        <button id="startBtn" class="btn btn-success btn-lg">▶ Start Simulation</button>
        <button id="stopBtn" class="btn btn-danger btn-lg ms-3" disabled>■ Stop</button>
    </div>

    <div class="row">
        <div class="col-md-8">
            <h5>Live Data Log</h5>
            <div id="log" class="log"></div>
        </div>
        
        <div class="col-md-4">
            <h5>Current Status</h5>
            <div id="status" class="alert alert-info">Waiting for data...</div>
            
            <h5>Seizure Sessions</h5>
            <div id="sessions" class="alert alert-warning">Sessions Detected: <strong>0</strong></div>
        </div>
    </div>

    <!-- Big Alert -->
    <div id="bigAlert" class="alert alert-danger seizure-alert text-center mt-4" style="display: none;">
        🚨 <strong>SEIZURE DETECTED!</strong> 🚨<br>
        <small>Immediate attention required</small>
    </div>
</div>

<script>
    let interval = null;
    let sessionCount = 0;
    let consecutiveSeizures = 0;

    function addToLog(message, isSeizure) {
        const logDiv = document.getElementById('log');
        const time = new Date().toLocaleTimeString();
        const colorClass = isSeizure ? 'text-danger' : 'text-light';
        logDiv.innerHTML += `<div class="${colorClass}">[${time}] ${message}</div>`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    document.getElementById('startBtn').addEventListener('click', () => {
        document.getElementById('startBtn').disabled = true;
        document.getElementById('stopBtn').disabled = false;

        interval = setInterval(async () => {
            // Simulate realistic sensor data
            const data = {
                heart_rate: (70 + Math.random() * 90).toFixed(1),
                spo2: (92 + Math.random() * 8).toFixed(1),
                temperature: (36.5 + Math.random() * 2.5).toFixed(2),
                vibration: (Math.random() * 1.2).toFixed(3)
            };

            try {
                const response = await fetch('/api/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                const isSeizure = result.prediction === 1;
                const prob = result.probability ? (result.probability * 100).toFixed(1) : 'N/A';

                addToLog(
                    `HR: ${data.heart_rate} | SpO2: ${data.spo2} | Temp: ${data.temperature} | Vib: ${data.vibration} → ${isSeizure ? 'SEIZURE' : 'Normal'} (${prob}%)`,
                    isSeizure
                );

                document.getElementById('status').innerHTML = `
                    Latest: <strong>${isSeizure ? 'SEIZURE' : 'Normal'}</strong> (${prob}%)
                `;

                if (isSeizure) {
                    consecutiveSeizures++;
                    if (consecutiveSeizures >= 2) {   // Trigger alert after 2+ consecutive
                        sessionCount++;
                        document.getElementById('sessions').innerHTML = `Sessions Detected: <strong>${sessionCount}</strong>`;
                        document.getElementById('bigAlert').style.display = 'block';
                    }
                } else {
                    consecutiveSeizures = 0;
                    document.getElementById('bigAlert').style.display = 'none';
                }

            } catch (err) {
                addToLog("❌ Failed to connect to server", true);
            }
        }, 1200);   // Send data every 1.2 seconds
    });

    document.getElementById('stopBtn').addEventListener('click', () => {
        clearInterval(interval);
        document.getElementById('startBtn').disabled = false;
        document.getElementById('stopBtn').disabled = true;
    });
</script>
</body>
</html>
